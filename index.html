<!DOCTYPE html>
<html>
<head>
  <title>Distributed Systems Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Distributed Systems Quiz</h1>
  <div class="quiz-box">
    <p id="progress"></p>
    <p id="question"></p>
    <div id="answers"></div>
    <p id="feedback"></p>
    <p id="score"></p>

    <div class="controls">
        <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question</button>
        <button id="reviewBtn" onclick="startReview()" style="display:none;">Review Wrong Answers</button>
    </div>
  </div>
</div>

<script src="questions.js"></script>

<script>
let current = 0, score = 0;
let shuffled = [];
let wrong = [];
let answered = false;

// 1. MENU LOGIC: Let the user choose a chapter
function showMenu() {
    document.getElementById("question").innerText = "Select a Chapter to Practice:";
    document.getElementById("progress").innerText = "";
    document.getElementById("score").innerText = "";
    document.getElementById("feedback").innerText = "";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("reviewBtn").style.display = "none";
    
    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    // Create "All Chapters" button
    createMenuBtn("All Chapters", () => startQuiz("all"));

    // Dynamically find unique chapters from your questions.js
    const uniqueChapters = [];
    const map = new Map();
    for (const item of questions) {
        if(!map.has(item.chapter)){
            map.set(item.chapter, true);
            uniqueChapters.push({
                num: item.chapter,
                title: item.chapterTitle
            });
        }
    }
    
    // Sort chapters numerically and create buttons
    uniqueChapters.sort((a, b) => a.num - b.num).forEach(ch => {
        createMenuBtn(`Chapter ${ch.num}: ${ch.title}`, () => startQuiz(ch.num));
    });
}

function createMenuBtn(text, clickHandler) {
    let b = document.createElement("button");
    b.innerText = text;
    b.className = "answer-btn"; 
    b.style.gridColumn = "span 2"; // Make chapter selection wide
    b.onclick = clickHandler;
    document.getElementById("answers").appendChild(b);
}

// 2. START LOGIC: Filter based on selection
function startQuiz(selection) {
    if (selection === "all") {
        shuffled = [...questions];
    } else {
        shuffled = questions.filter(q => q.chapter === selection);
    }
    
    shuffle(shuffled);
    current = 0;
    score = 0;
    wrong = [];
    loadQuestion();
}

function shuffle(a){
    for(let i=a.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
}

function loadQuestion(){
    if(current >= shuffled.length) return endGame();
    
    answered = false;
    let q = shuffled[current];
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("feedback").innerText = "";
    
    document.getElementById("progress").innerText = `Question ${current + 1} of ${shuffled.length}`;
    document.getElementById("question").innerText = `[Ch ${q.chapter}: ${q.chapterTitle}]\n\n${q.question}`;

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    if(q.type === "tf"){
        createAnswerBtn(true, "True", ansDiv);
        createAnswerBtn(false, "False", ansDiv);
    } else {
        q.options.forEach((opt, i) => {
            createAnswerBtn(i, opt, ansDiv);
        });
    }
    scoreDisplay();
}

function createAnswerBtn(val, text, container) {
    let b = document.createElement("button");
    b.innerText = text;
    b.className = "answer-btn";
    b.onclick = () => handleAnswer(val, b);
    container.appendChild(b);
}

function handleAnswer(userPick, btnElement){
    if(answered) return;
    answered = true;
    
    let q = shuffled[current];
    let isCorrect = (userPick === q.answer);
    
    const allButtons = document.querySelectorAll('.answer-btn');
    allButtons.forEach(btn => btn.disabled = true);

    if(isCorrect){
        score++;
        btnElement.classList.add("correct");
        document.getElementById("feedback").innerText = "✅ Correct!";
    } else {
        btnElement.classList.add("wrong");
        document.getElementById("feedback").innerText = "❌ Incorrect";
        wrong.push(q);
    }
    
    document.getElementById("nextBtn").style.display = "inline-block";
    scoreDisplay();
}

function scoreDisplay(){
    document.getElementById("score").innerText = `Current Score: ${score}/${current + (answered ? 1 : 0)}`;
}

function nextQuestion(){
    current++;
    loadQuestion();
}

function endGame(){
    document.getElementById("question").innerText = "Quiz Complete!";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("feedback").innerText = `Final Result: ${score} / ${shuffled.length}`;
    
    // Allow user to return to menu
    let menuBtn = document.createElement("button");
    menuBtn.innerText = "Back to Chapter Selection";
    menuBtn.className = "answer-btn";
    menuBtn.style.gridColumn = "span 2";
    menuBtn.style.marginTop = "20px";
    menuBtn.onclick = showMenu;
    document.getElementById("answers").appendChild(menuBtn);

    if(wrong.length > 0) {
        document.getElementById("reviewBtn").style.display = "inline-block";
    }
}

function startReview(){
    shuffled = [...wrong];
    wrong = [];
    current = 0;
    score = 0;
    document.getElementById("reviewBtn").style.display = "none";
    loadQuestion();
}

// Kick off the application with the menu
showMenu();
</script>
</body>
</html>
